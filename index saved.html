<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ET Water Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#f0f4f0;
  --surface:#fff;
  --text:#111c14;
  --muted:#7a8c7e;
  --accent:#1a6b38;
  --accent-light:#e4f1e9;
  --water:#1565c0;
  --gold:#b8860b;
  --danger:#c62828;
  --r:18px;
  --sh:0 2px 14px rgba(0,0,0,.08);
  --sh2:0 6px 28px rgba(0,0,0,.14);
}
body.dark{
  --bg:#0e1810;--surface:#162018;--text:#e0ede3;
  --muted:#6a8070;--accent-light:#1a2e20;
  --sh:0 2px 14px rgba(0,0,0,.3);--sh2:0 6px 28px rgba(0,0,0,.45);
}
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── PAGE VIEWS ── */
#view-main,#view-brand{width:100%}
#view-brand{display:none}

/* ── HEADER ── */
.hdr{
  background:var(--accent);color:#fff;
  padding:13px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-drop{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;line-height:1.1}
.hdr-sub{font-size:11px;opacity:.75}
.hdr-badge{background:var(--gold);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

/* ── SEARCH ROW ── */
.search-wrap{background:var(--bg);padding:11px 14px 6px;position:sticky;top:65px;z-index:40;transition:background .3s}
.search-row{display:flex;gap:8px}
.sbox{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid transparent;border-radius:14px;padding:9px 13px;box-shadow:var(--sh)}
.sbox:focus-within{border-color:var(--accent)}
.sbox span{font-size:15px;opacity:.4;flex-shrink:0}
.sbox input{background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);width:100%}
.sbox input::placeholder{color:var(--muted)}
.sort-tog{background:var(--surface);border:1.5px solid transparent;border-radius:14px;padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);box-shadow:var(--sh);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.sort-tog.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* ── CHIPS ── */
.chips{display:flex;gap:7px;padding:8px 14px 6px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 14px;border:1.5px solid transparent;border-radius:30px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .17s}
.chip.on,.chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* ── RESULTS LABEL ── */
.rlabel{padding:2px 16px 8px;font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.3px}

/* ── GRID ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px;padding:0 14px 130px}

/* ── CARD ── */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;animation:fadeUp .32s ease both}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.card:active{transform:scale(.96)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.card-img{width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,var(--accent-light),#daeeff);overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.card:hover .card-img img{transform:scale(1.07)}
/* shimmer */
.card-img.shimmer::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

.card-body{padding:10px 12px 13px}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:5px}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.card-from{font-size:11px;color:var(--muted)}
.card-price{font-size:13px;font-weight:700;color:var(--accent)}

/* ── NO RESULTS ── */
#no-res{display:none;grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);font-size:15px}
#no-res .nr-i{font-size:40px;margin-bottom:10px}

/* ── BRAND DETAIL VIEW ── */
#view-brand .brand-hdr{
  background:var(--accent);color:#fff;
  padding:13px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.25);
}
#view-brand .back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#view-brand .back-btn:active{opacity:.75}
#view-brand .bname{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
#view-brand .bsub{font-size:12px;opacity:.75}

.brand-hero{width:100%;height:220px;overflow:hidden;background:var(--accent-light);position:relative}
.brand-hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.82)}
.brand-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:18px}
.bh-name{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:#fff;line-height:1}
.bh-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}

.v-list{padding:16px 14px 0}
.v-lbl{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.variant{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);border-left:4px solid var(--accent)}
.v-size{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.v-price{font-size:21px;font-weight:700;color:var(--accent)}
.v-price sup{font-size:12px;font-weight:400;color:var(--muted);vertical-align:super}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .18s,transform .15s}
.add-btn:active{opacity:.82;transform:scale(.95)}

.nutri{margin:20px 14px 0;background:var(--surface);border-radius:16px;box-shadow:var(--sh);overflow:hidden}
.nutri-head{background:var(--accent-light);padding:12px 16px;display:flex;align-items:center;gap:8px}
.nutri-head h3{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--accent)}
.nutri-table{width:100%;border-collapse:collapse}
.nutri-table tr:not(:last-child) td{border-bottom:1px solid rgba(0,0,0,.05)}
.nutri-table td{padding:11px 16px;font-size:14px}
.nutri-table td:last-child{text-align:right;font-weight:600;color:var(--water)}

/* ── CART ── */
#cart{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-radius:22px 22px 0 0;
  box-shadow:0 -4px 28px rgba(0,0,0,.16);
  padding:0 16px 22px;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(.32,.72,0,1);
  z-index:200;max-height:72vh;display:flex;flex-direction:column
}
#cart.open{transform:translateY(0)}
.cart-pill{width:40px;height:4px;border-radius:3px;background:rgba(0,0,0,.1);margin:12px auto 14px;flex-shrink:0}
.cart-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0}
.cart-ttl{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
.cart-badge{background:var(--accent);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
#cart-list{list-style:none;overflow-y:auto;flex:1}
.ci{display:flex;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:14px}
.ci-name{flex:1;font-weight:500;line-height:1.3}
.ci-sub{font-size:11px;color:var(--muted)}
.ci-ctrl{display:flex;align-items:center;gap:5px}
.qb{width:32px;height:32px;border:none;border-radius:50%;font-size:18px;cursor:pointer;font-weight:700;transition:transform .12s}
.qb:active{transform:scale(.86)}
.qm{background:rgba(198,40,40,.1);color:var(--danger)}
.qp{background:rgba(26,107,56,.1);color:var(--accent)}
.qi{width:46px;height:32px;text-align:center;font-size:15px;font-weight:600;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif}
.qi::-webkit-outer-spin-button,.qi::-webkit-inner-spin-button{-webkit-appearance:none}
.ci-tot{font-weight:700;color:var(--accent);min-width:60px;text-align:right}
#cart-empty{text-align:center;padding:28px 0;color:var(--muted)}
#cart-empty span{display:block;font-size:36px;margin-bottom:8px}
#cart-total{display:flex;justify-content:space-between;align-items:center;padding:14px 0 0;border-top:2px solid rgba(0,0,0,.06);flex-shrink:0}
#cart-total .lbl{color:var(--muted);font-size:15px}
#cart-total .amt{font-family:'Syne',sans-serif;font-weight:800;font-size:23px;color:var(--accent)}

/* ── FOOTER ── */
.footer{text-align:center;padding:22px 16px;color:var(--muted);font-size:13px;border-top:1px solid rgba(0,0,0,.07);background:rgba(0,0,0,.02)}
.footer strong{color:var(--accent);font-size:15px}

@media(min-width:500px){body{max-width:480px;margin:0 auto}}
</style>
</head>

/* ── STATE ── */
let cart=[], sortAsc=false, activeFilter='all';
const BOT='8753262541:AAHN5BUj05rmelhMyHT29oUO2a9Fpt2lb8I';
const CID='421868479';

/* ── GRID ── */
const grid=document.getElementById('grid');
const noRes=document.getElementById('no-res');
const rlabel=document.getElementById('rlabel');

function minP(b){ return Math.min(...b.variants.map(v=>v.p)); }

function renderGrid(list){
  // remove old cards, keep #no-res
  grid.querySelectorAll('.card').forEach(c=>c.remove());
  noRes.style.display = list.length===0 ? 'block' : 'none';
  rlabel.textContent = list.length===brands.length
    ? `${list.length} brands available`
    : `${list.length} of ${brands.length} brands`;

  list.forEach((b,i)=>{
    const mp=minP(b);
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=(i*0.03)+'s';
    card.innerHTML=`
      <div class="card-img shimmer">
        <img src="${b.img}" alt="${b.name}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-name">${b.name}</div>
        <div class="card-foot">
          <div class="card-from">From</div>
          <div class="card-price">${mp} Birr</div>
        </div>
      </div>`;
    const wrap=card.querySelector('.card-img');
    const img=card.querySelector('img');
    img.addEventListener('load',()=>wrap.classList.remove('shimmer'));
    img.addEventListener('error',()=>wrap.classList.remove('shimmer'));
    card.addEventListener('click',()=>openBrand(b.id));
    grid.appendChild(card);
  });
}

function filteredList(){
  let list=brands.filter(b=>{
    const q=document.getElementById('q').value.toLowerCase().trim();
    const nameOk=!q||b.name.toLowerCase().includes(q)||b.disp.toLowerCase().includes(q);
    const sizeOk=activeFilter==='all'||b.variants.some(v=>v.s===activeFilter);
    return nameOk&&sizeOk;
  });
  if(sortAsc) list=[...list].sort((a,b)=>minP(a)-minP(b));
  return list;
}

function refresh(){ renderGrid(filteredList()); }
refresh();

/* ── SEARCH ── */
let st;
document.getElementById('q').addEventListener('input',()=>{clearTimeout(st);st=setTimeout(refresh,230)});

/* ── CHIPS ── */
document.getElementById('chips').addEventListener('click',e=>{
  const chip=e.target.closest('.chip'); if(!chip) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on');
  activeFilter=chip.dataset.f;
  refresh();
});

/* ── SORT ── */
document.getElementById('sortBtn').addEventListener('click',()=>{
  sortAsc=!sortAsc;
  const btn=document.getElementById('sortBtn');
  btn.classList.toggle('on',sortAsc);
  btn.textContent=sortAsc?'↑ Price Low':'↑↓ Price';
  refresh();
});

/* ── BRAND DETAIL ── */
function openBrand(id){
  const b=brands.find(x=>x.id===id); if(!b) return;
  document.getElementById('vb-name').textContent=b.name;
  document.getElementById('vb-sub').textContent=b.disp;

  const varHTML=b.variants.filter(v=>v.s).map(v=>`
    <div class="variant">
      <div><div class="v-size">${v.s}</div><div class="v-price">${v.p}<sup> Birr</sup></div></div>
      <button class="add-btn" data-bd="${b.disp}" data-s="${v.s}" data-p="${v.p}">+ Add</button>
    </div>`).join('');

  const nutHTML=b.nut?.length?`
    <div class="nutri">
      <div class="nutri-head"><span>🧪</span><h3>Nutrition Facts — per Liter</h3></div>
      <table class="nutri-table">${b.nut.map(n=>`<tr><td>${n.l}</td><td>${n.v}</td></tr>`).join('')}</table>
    </div>`:'';

  document.getElementById('brand-body').innerHTML=`
    <div class="brand-hero">
      <img src="${b.img}" alt="${b.name}">
      <div class="brand-hero-overlay">
        <div class="bh-name">${b.name}</div>
        <div class="bh-sub">${b.disp}</div>
      </div>
    </div>
    <div class="v-list">
      <div class="v-lbl">Choose size</div>
      ${varHTML}
      ${nutHTML}
    </div>`;

  document.getElementById('view-main').style.display='none';
  document.getElementById('view-brand').style.display='block';
  window.scrollTo({top:0,behavior:'instant'});
  if(tg) tg.HapticFeedback.impactOccurred('light');
}

document.getElementById('backBtn').addEventListener('click',()=>{
  document.getElementById('view-brand').style.display='none';
  document.getElementById('view-main').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  if(tg) tg.HapticFeedback.impactOccurred('light');
});

if(tg) tg.BackButton.onClick(()=>{
  if(document.getElementById('view-brand').style.display==='block'){
    document.getElementById('backBtn').click();
  }
});

/* ── ADD TO CART ── */
document.addEventListener('click',e=>{
  const btn=e.target.closest('.add-btn'); if(!btn) return;
  const {bd,s,p}=btn.dataset;
  const key=`${bd}|${s}`;
  const ex=cart.find(i=>`${i.bd}|${i.s}`===key);
  if(ex) ex.qty++; else cart.push({bd,s,p:Number(p),qty:1});
  renderCart();
  if(tg){
    tg.HapticFeedback.impactOccurred('medium');
    tg.showPopup({title:'✅ Added',message:`${bd} ${s} added to cart.`,buttons:[{type:'ok'}]});
  }
});

/* ── CART RENDER ── */
function renderCart(){
  const list=document.getElementById('cart-list');
  const empty=document.getElementById('cart-empty');
  const amt=document.getElementById('cart-amt');
  const badge=document.getElementById('cbadge');
  const cartEl=document.getElementById('cart');
  list.innerHTML='';
  let total=0,totalQty=0;

  if(!cart.length){
    empty.style.display='block';
    amt.textContent='0 Birr';
    badge.textContent='0 items';
    cartEl.classList.remove('open');
    if(tg){ tg.MainButton.hide(); tg.BackButton.hide(); }
    return;
  }
  empty.style.display='none';
  cartEl.classList.add('open');
  if(tg){ tg.BackButton.show(); }

  cart.forEach((item,i)=>{
    const line=item.p*item.qty; total+=line; totalQty+=item.qty;
    const li=document.createElement('li');
    li.className='ci';
    li.innerHTML=`
      <div class="ci-name">${item.bd}<br><span class="ci-sub">${item.s}</span></div>
      <div class="ci-ctrl">
        <button class="qb qm" data-i="${i}" data-d="-1">−</button>
        <input class="qi" type="number" value="${item.qty}" min="0" max="1000" data-i="${i}">
        <button class="qb qp" data-i="${i}" data-d="1">+</button>
      </div>
      <div class="ci-tot">${line} Birr</div>`;
    list.appendChild(li);
  });

  amt.textContent=`${total} Birr`;
  badge.textContent=`${totalQty} item${totalQty!==1?'s':''}`;
  if(tg){ tg.MainButton.setText(`Checkout • ${total} Birr`); tg.MainButton.show(); }
}

/* qty events */
document.addEventListener('click',e=>{
  const btn=e.target.closest('.qb'); if(!btn) return;
  const i=Number(btn.dataset.i), d=Number(btn.dataset.d);
  if(!isNaN(i)&&cart[i]){
    cart[i].qty=Math.max(0,Math.min(1000,cart[i].qty+d));
    if(cart[i].qty===0) cart.splice(i,1);
    renderCart(); if(tg) tg.HapticFeedback.impactOccurred('light');
  }
});
document.addEventListener('input',e=>{
  const inp=e.target.closest('.qi'); if(!inp) return;
  const i=Number(inp.dataset.i), val=Math.max(0,Math.min(1000,parseInt(inp.value)||0));
  if(!isNaN(i)&&cart[i]){ cart[i].qty=val; if(val===0) cart.splice(i,1); renderCart(); }
});

/* ── CHECKOUT ── */
async function doCheckout(){
  if(!cart.length) return;
  const phone=prompt('📞 Phone number for delivery (Addis Ababa)\nExample: 0912345678','');
  if(!phone||phone.trim().length<9){ if(tg) tg.showAlert('Please enter a valid phone number.'); else alert('Please enter a valid phone number.'); return; }
  let items='',total=0;
  cart.forEach(i=>{ const l=i.p*i.qty; total+=l; items+=`• ${i.bd} ${i.s} × ${i.qty} = ${l} Birr\n`; });
  const msg=`🛒 New Water Order – ET Water Market\n📞 Phone: ${phone.trim()}\n📍 Delivery: Addis Ababa\n\nItems:\n${items}\n────────────\n💰 Total: ${total} Birr\n\nOrdered via Telegram Mini App`;
  try{
    const r=await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:CID,text:msg})
    });
    const d=await r.json();
    if(d.ok){
      if(tg) tg.showPopup({title:'✅ Order Confirmed!',message:'We will contact you soon.',buttons:[{type:'ok'}]});
      else alert('Order confirmed!');
      cart=[]; renderCart();
      document.getElementById('view-brand').style.display='none';
      document.getElementById('view-main').style.display='block';
    } else {
      if(tg) tg.showAlert('Error: '+(d.description||'Unknown')); else alert('Error');
    }
  }catch{ if(tg) tg.showAlert('No internet connection.'); else alert('No internet.'); }
}

if(tg) tg.MainButton.onClick(doCheckout);

renderCart();
</script>
